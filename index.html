<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Current Affairs</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<main class="page">
    <header>
        <h1>Global Current Affairs</h1>

        <div class="actions">
            <input id="searchInput" type="search" placeholder="Search news..." />
            <button id="searchButton">Search</button>
        </div>

        <div class="actions" id="categoryButtons">
            <button class="category-button active" data-query="accident OR war OR disaster">All</button>
            <button class="category-button" data-query="accident OR crash">Accidents</button>
            <button class="category-button" data-query="war OR conflict">War</button>
            <button class="category-button" data-query="earthquake OR flood">Disaster</button>
        </div>

        <p id="statusText">Loading news...</p>
    </header>

    <section class="content">
        <div id="newsContainer" class="news-grid"></div>
    </section>

    <div id="map"></div>
</main>

<script src="script.js"></script>
</body>
</html>
